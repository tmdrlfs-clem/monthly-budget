<body><section class="auth-gate" id="authGate"><form class="auth-card" id="authForm"><div class="auth-mark">$</div><span class="eye">PRIVATE BUDGET</span><h1>월간 살림</h1><p>예산을 보려면 비밀번호를 입력하세요.<br>저장 데이터는 이 기기에서 암호화됩니다.</p><label>비밀번호<input id="passwordInput" type="password" required autocomplete="current-password" autofocus placeholder="비밀번호"></label><button class="primary" id="unlockButton">잠금 해제</button><p class="auth-error" id="authError" role="alert"></p></form></section><main id="app" hidden><header class="top"><div class="brand"><span class="mark">$</span><div><b>월간 살림</b><small>내 돈의 흐름을 한눈에</small></div></div><div class="monthnav"><button onclick="move(-1)">‹</button><strong id="monthTitle"></strong><button onclick="move(1)">›</button></div><div class="topActions"><button class="mini-btn" onclick="exportBackup()" title="암호화 백업 내보내기">⬇ 백업</button><button class="mini-btn" onclick="backupFile.click()" title="암호화 백업 복원">⬆ 복원</button><button class="today" onclick="goToday()">이번 달</button><input id="backupFile" type="file" accept=".json,application/json" hidden></div></header>
