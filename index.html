<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>월간 살림</title>
<style>
:root{--ink:#1d2a24;--muted:#738078;--paper:#f4f1e8;--card:#fffdf8;--green:#2f6b4f;--lime:#c6e36b;--orange:#e77b46;--purple:#76629b;--red:#b84432;--line:#ddd9cc}*{box-sizing:border-box}body{margin:0;background:var(--paper);color:var(--ink);font-family:"Apple SD Gothic Neo","Noto Sans KR",Arial,sans-serif}button,input{font:inherit}button{cursor:pointer}.top{height:74px;padding:0 5vw;display:grid;grid-template-columns:1fr auto 1fr;align-items:center;border-bottom:1px solid var(--line);position:sticky;top:0;background:#f4f1e8ed;backdrop-filter:blur(12px);z-index:2}.brand{display:flex;align-items:center;gap:10px}.mark{width:36px;height:36px;border-radius:50%;display:grid;place-items:center;background:var(--ink);color:var(--lime);font-weight:900}.brand div{display:flex;flex-direction:column}.brand small,.muted{color:var(--muted);font-size:12px}.monthnav{display:flex;align-items:center;gap:16px}.monthnav button,.today{border:1px solid var(--line);background:transparent;border-radius:99px}.monthnav button{width:32px;height:32px;font-size:23px}.today{justify-self:end;padding:8px 15px}.hero{max-width:1200px;margin:auto;padding:65px 24px 35px;display:grid;grid-template-columns:1.3fr .7fr;gap:35px;align-items:end}.eye{font-size:11px;letter-spacing:.16em;color:var(--green);font-weight:800}.hero h1{font-family:Georgia,serif;font-size:clamp(42px,6vw,76px);line-height:1.04;letter-spacing:-.05em;margin:11px 0}.hero h1 em{color:var(--green);font-weight:inherit}.hero p{color:var(--muted);line-height:1.7;max-width:570px}.balance{padding:30px;border-radius:26px;background:var(--ink);color:white;display:flex;flex-direction:column;min-height:185px;justify-content:center;box-shadow:0 18px 40px #1d2a2425}.balance.danger{background:#6d3627}.balance span,.balance small{color:#c3cec7}.balance strong{font:42px Georgia,serif;margin:8px 0 14px}.stats{max-width:1200px;margin:0 auto 20px;padding:0 24px;display:grid;grid-template-columns:repeat(4,1fr);gap:11px}.stat{background:var(--card);border:1px solid var(--line);border-radius:17px;padding:19px;display:flex;align-items:center;gap:8px;color:var(--muted)}.stat strong{margin-left:auto;color:var(--ink);font-size:19px}.dot{width:9px;height:9px;border-radius:50%}.inc{background:var(--green)}.exp{background:var(--orange)}.sav{background:var(--purple)}.workspace{max-width:1200px;margin:auto;padding:0 24px 60px;display:grid;grid-template-columns:1.5fr .75fr;gap:17px}.panel{background:var(--card);border:1px solid var(--line);border-radius:21px;padding:25px}.panel h2{font-family:Georgia,serif;font-size:27px;margin:5px 0 20px}.head{display:flex;justify-content:space-between}.entry{display:grid;grid-template-columns:40px 1fr auto 28px;gap:11px;align-items:center;border-top:1px solid #e9e5da;padding:14px 8px;cursor:pointer;border-radius:12px;transition:.2s}.entry:hover{background:#f4f1e8}.entry.paid{background:#e8f3e9;opacity:.72}.entry.paid .amount,.entry.paid b{text-decoration:line-through}.entry.warning{background:#fff1cf;border-color:#e9ad42;animation:pulse 1.25s infinite}.entry.overdue{background:#fde3de;border-color:var(--red)}@keyframes pulse{50%{box-shadow:0 0 0 4px #e9ad4238}}.icon{width:37px;height:37px;border-radius:11px;display:grid;place-items:center;font-weight:bold}.icon.income{background:#dcecdf;color:var(--green)}.icon.expense{background:#f6e2d8;color:var(--orange)}.icon.saving{background:#ece7f5;color:var(--purple)}.entry div{display:flex;flex-direction:column;gap:3px}.entry small{color:var(--muted)}.badges{display:flex!important;flex-direction:row!important;gap:5px!important}.badge{font-size:10px;padding:2px 6px;border-radius:99px;background:#ece9df;color:var(--muted)}.badge.paid{background:var(--green);color:white}.badge.warning{background:#e9ad42;color:#513300}.badge.overdue{background:var(--red);color:white}.amount.income{color:var(--green)}.amount.expense{color:var(--orange)}.amount.saving{color:var(--purple)}.del{border:0;background:none;color:#aaa;font-size:20px}.side{display:flex;flex-direction:column;gap:17px}.seg{display:grid;grid-template-columns:repeat(3,1fr);padding:4px;background:#ece9df;border-radius:11px;margin-bottom:16px}.seg button{border:0;background:transparent;padding:9px;border-radius:8px;color:var(--muted)}.seg button.on{background:white;color:var(--ink);box-shadow:0 2px 7px #0001}label{display:flex;flex-direction:column;gap:6px;margin:11px 0;color:var(--muted);font-size:13px}.check{flex-direction:row;align-items:center;gap:9px}.check input{width:18px;height:18px}input{padding:12px;border:1px solid var(--line);border-radius:10px;outline:none;background:white}input:focus{border-color:var(--green);box-shadow:0 0 0 3px #2f6b4f1a}.primary{width:100%;padding:13px;border:0;border-radius:11px;background:var(--green);color:white;font-weight:bold;margin-top:8px}.empty{text-align:center;color:var(--muted);padding:28px 0}.bar{margin:14px 0}.bar div{display:flex;justify-content:space-between;font-size:13px}.bar i{display:block;height:6px;background:#e7e4db;border-radius:99px;margin-top:7px;overflow:hidden}.bar u{display:block;height:100%;background:var(--lime)}footer{text-align:center;border-top:1px solid var(--line);padding:22px;color:var(--muted);font-size:12px}@media(max-width:820px){.hero,.workspace{grid-template-columns:1fr}.stats{grid-template-columns:1fr 1fr}.today,.brand small{display:none}.top{grid-template-columns:1fr auto}}@media(max-width:500px){.top{padding:0 16px}.hero,.stats,.workspace{padding-left:15px;padding-right:15px}.stats{grid-template-columns:1fr}.panel{padding:19px}.hero h1{font-size:47px}.entry{grid-template-columns:37px 1fr auto 22px}.amount{font-size:13px}}

/* One-screen desktop dashboard */
@media(min-width:821px){html,body{height:100%;overflow:hidden}.top{height:58px}.hero{padding:18px 24px 12px;grid-template-columns:1fr 310px;gap:22px}.hero h1{font-size:clamp(32px,3.4vw,48px);margin:5px 0;line-height:1}.hero p{margin:8px 0 0;line-height:1.4}.balance{min-height:105px;padding:16px 22px;border-radius:19px}.balance strong{font-size:30px;margin:4px 0 6px}.stats{margin-bottom:10px}.stat{padding:11px 14px;border-radius:13px}.stat strong{font-size:16px}.workspace{height:calc(100vh - 236px);padding-bottom:12px;grid-template-columns:minmax(0,1.65fr) minmax(300px,.75fr);gap:12px}.workspace>.panel,.side>.panel{padding:14px 16px;border-radius:16px}.panel h2{font-size:21px;margin:2px 0 8px}.workspace>.panel{min-height:0;display:flex;flex-direction:column}.workspace>.panel #entries{min-height:0;overflow:auto;padding-right:5px}.entry{padding:7px 6px;grid-template-columns:34px 1fr auto 24px;gap:8px}.icon{width:31px;height:31px;border-radius:9px}.entry small{font-size:11px}.badge{font-size:9px;padding:1px 5px}.side{min-height:0;display:grid;grid-template-rows:auto minmax(0,1fr);gap:10px}.side>.panel:last-child{min-height:0;overflow:auto}.seg{margin-bottom:6px}.seg button{padding:6px}label{margin:5px 0;gap:3px}input{padding:8px}.primary{padding:9px;margin-top:5px}.bar{margin:8px 0}footer{display:none}}
@media(max-width:820px){html,body{overflow:auto}.workspace{height:auto}.side{display:flex}}
.auth-gate{position:fixed;inset:0;z-index:99;display:grid;place-items:center;padding:20px;background:radial-gradient(circle at top,#dfe8c2 0,#f4f1e8 44%,#e8e2d4 100%)}.auth-gate[hidden],#app[hidden]{display:none}.auth-card{width:min(410px,100%);padding:34px;border:1px solid var(--line);border-radius:26px;background:var(--card);box-shadow:0 24px 70px #1d2a2430;text-align:center}.auth-mark{width:54px;height:54px;margin:auto;border-radius:50%;display:grid;place-items:center;background:var(--ink);color:var(--lime);font-size:25px;font-weight:900}.auth-card h1{font:34px Georgia,serif;margin:17px 0 8px}.auth-card p{color:var(--muted);line-height:1.55;margin:0 0 20px}.auth-card label{text-align:left}.auth-error{min-height:20px;margin:9px 0 0!important;color:var(--red)!important;font-size:13px}.auth-card button:disabled{opacity:.6;cursor:wait}
</style></head>
<body><section class="auth-gate" id="authGate"><form class="auth-card" id="authForm"><div class="auth-mark">$</div><span class="eye">PRIVATE BUDGET</span><h1>월간 살림</h1><p>예산을 보려면 비밀번호를 입력하세요.<br>저장 데이터는 이 기기에서 암호화됩니다.</p><label>비밀번호<input id="passwordInput" type="password" required autocomplete="current-password" autofocus placeholder="비밀번호"></label><button class="primary" id="unlockButton">잠금 해제</button><p class="auth-error" id="authError" role="alert"></p></form></section><main id="app" hidden><header class="top"><div class="brand"><span class="mark">$</span><div><b>월간 살림</b><small>내 돈의 흐름을 한눈에</small></div></div><div class="monthnav"><button onclick="move(-1)">‹</button><strong id="monthTitle"></strong><button onclick="move(1)">›</button></div><button class="today" onclick="goToday()">이번 달</button></header>
<section class="hero"><div><span class="eye">MONTHLY PLAN</span><h1><span id="heroMonth"></span>월, <span id="heroLead"></span><br><em id="heroEm"></em><span id="heroTail"></span></h1><p id="heroComment"></p></div><div class="balance" id="balanceCard"><span>이번 달 남은 돈</span><strong id="balance"></strong><small id="balanceNote"></small></div></section>
<section class="stats"><article class="stat"><i class="dot inc"></i>수입<strong id="income"></strong></article><article class="stat"><i class="dot exp"></i>지출<strong id="expense"></strong></article><article class="stat"><i class="dot sav"></i>저축<strong id="saving"></strong></article><article class="stat">수입 대비 지출<strong id="ratio"></strong></article></section>
<section class="workspace"><div class="panel"><div class="head"><div><span class="eye">DETAILS</span><h2>이번 달 내역</h2></div><span class="muted" id="count"></span></div><div id="entries"></div></div><aside class="side"><form class="panel" id="form"><span class="eye">QUICK ADD</span><h2>새 내역 추가</h2><div class="seg"><button type="button" data-kind="expense" class="on">지출</button><button type="button" data-kind="income">수입</button><button type="button" data-kind="saving">저축</button></div><label>항목<input id="category" required placeholder="예: 식료품"></label><label>금액 (NZD)<input id="amountInput" required type="number" min="0.01" step="0.01" placeholder="0"></label><label>예정일 (선택)<input id="due" type="number" min="1" max="31" placeholder="날짜"></label><label class="check"><input id="recurring" type="checkbox" checked>매달 반복되는 내역</label><button class="primary">내역 추가하기</button></form><div class="panel"><span class="eye">SPENDING</span><h2>지출 상위 항목</h2><div id="categories"></div></div></aside></section><footer>항목을 클릭하면 Paid 처리 · 암호화 자동 저장 · 통화 NZD</footer></main>
<script>
const fmt=new Intl.NumberFormat('ko-KR',{style:'currency',currency:'NZD',maximumFractionDigits:0});let date=new Date(),kind='expense',vault={},cryptoKey=null,persistChain=Promise.resolve();const VAULT_KEY='monthly-sallim-vault-v1',AUTH_SALT='monthly-sallim-auth-v1|',AUTH_HASH='686f07bc57c40fc48b1c942069fdd320d7b62bac0c7fd74b908b88066be08c2d',ENC_SALT='monthly-sallim-encryption-v1';const key=()=>`${date.getFullYear()}-${String(date.getMonth()+1).padStart(2,'0')}`,monthStoreKey=()=>`monthly-sallim-${key()}`,store=()=>vault[monthStoreKey()]||null,save=x=>{vault[monthStoreKey()]=x;persistVault()};const enc=new TextEncoder(),dec=new TextDecoder(),hex=b=>[...new Uint8Array(b)].map(x=>x.toString(16).padStart(2,'0')).join(''),toB64=b=>{let s='';new Uint8Array(b).forEach(x=>s+=String.fromCharCode(x));return btoa(s)},fromB64=s=>Uint8Array.from(atob(s),c=>c.charCodeAt(0));async function deriveKey(password){let material=await crypto.subtle.importKey('raw',enc.encode(password),'PBKDF2',false,['deriveKey']);return crypto.subtle.deriveKey({name:'PBKDF2',salt:enc.encode(ENC_SALT),iterations:250000,hash:'SHA-256'},material,{name:'AES-GCM',length:256},false,['encrypt','decrypt'])}async function persistVault(){if(!cryptoKey)return;persistChain=persistChain.then(async()=>{let iv=crypto.getRandomValues(new Uint8Array(12)),data=await crypto.subtle.encrypt({name:'AES-GCM',iv},cryptoKey,enc.encode(JSON.stringify(vault)));localStorage.setItem(VAULT_KEY,JSON.stringify({v:1,iv:toB64(iv),data:toB64(data)}))}).catch(()=>{});return persistChain}async function unlock(password){let digest=hex(await crypto.subtle.digest('SHA-256',enc.encode(AUTH_SALT+password)));if(digest!==AUTH_HASH)throw new Error('비밀번호가 맞지 않습니다.');cryptoKey=await deriveKey(password);let packed=localStorage.getItem(VAULT_KEY);if(packed){let p=JSON.parse(packed),plain=await crypto.subtle.decrypt({name:'AES-GCM',iv:fromB64(p.iv)},cryptoKey,fromB64(p.data));vault=JSON.parse(dec.decode(plain))}else{for(let i=0;i<localStorage.length;i++){let k=localStorage.key(i);if(k&&k.startsWith('monthly-sallim-')&&k!==VAULT_KEY){try{vault[k]=JSON.parse(localStorage.getItem(k))}catch{}}}await persistVault();Object.keys(vault).forEach(k=>localStorage.removeItem(k))}}
const seed=()=>[['income','주 수입',8653,null,true],['expense','주거비',2760.33,1,true],['expense','전기',180,10,true],['expense','수도',80,12,true],['expense','휴대폰',45,15,true],['expense','지방세',164,20,true],['expense','Richmond',120,20,true],['expense','Glossary',2000,25,true],['expense','주택 보험',192,18,true],['expense','의료비',150,null,false]].map((x,i)=>({id:Date.now()+i,kind:x[0],category:x[1],amount:x[2],due:x[3],recurring:x[4],paid:false}));
const monthlyMessages=[
['작은 시작이','큰 여유','를 만들어요.','오늘 아낀 작은 금액이 올해의 든든한 시작이 됩니다.'],
['흔들리지 않는','저축 습관','을 키워요.','금액보다 꾸준함이 중요해요. 이번 달도 나를 먼저 저축하세요.'],
['내 돈의 길을','분명하게','정해요.','목표가 있는 돈은 쉽게 사라지지 않습니다. 원하는 미래를 숫자로 적어보세요.'],
['지출을 다듬고','여유를 심어','보세요.','한 번의 현명한 선택이 다음 달의 부담을 가볍게 만듭니다.'],
['미래의 나에게','든든한 선물','을 주세요.','저축은 참는 일이 아니라 내가 원하는 삶을 먼저 선택하는 일입니다.'],
['반년의 노력을','자산으로','바꿔요.','완벽하지 않아도 괜찮아요. 지난달보다 조금 나아지면 충분합니다.'],
['돈에게','좋은 역할','을 주세요.','쓰고 남은 돈이 아니라, 먼저 모은 돈이 미래의 선택권을 만듭니다.'],
['한 번 더 생각하고','한 걸음 더','모아요.','충동을 한 번 넘길 때마다 목표에는 한 걸음 더 가까워집니다.'],
['새 계절처럼','저축도 새롭게','시작해요.','작은 자동저축 하나가 의지보다 강한 시스템을 만들어 줍니다.'],
['소비는 가볍게','목표는 단단하게','지켜요.','필요한 것과 원하는 것을 구분하면 돈이 머무를 자리가 생깁니다.'],
['올해의 노력을','숫자로 확인','해요.','모아온 금액을 바라보세요. 꾸준한 내가 이미 가장 좋은 투자입니다.'],
['잘 모은 나에게','따뜻한 박수','를 보내요.','한 해의 저축은 미래의 나에게 보내는 가장 믿음직한 응원입니다.']
];
function prevKey(){let p=new Date(date.getFullYear(),date.getMonth()-1,1);return `${p.getFullYear()}-${String(p.getMonth()+1).padStart(2,'0')}`}
function data(){let x=store();if(!x){let prev=vault['monthly-sallim-'+prevKey()]||null;x=prev&&prev.some(e=>e.recurring)?prev.filter(e=>e.recurring).map((e,i)=>({...e,id:Date.now()+i,paid:false})):seed();save(x)}let changed=false;x=x.map(e=>{if(e.paid===undefined){e.paid=false;changed=true}if(e.recurring===undefined){e.recurring=!!e.due||e.kind==='income';changed=true}return e});if(changed)save(x);return x}
function dueState(e){if(e.paid)return'paid';if(!e.due)return'';let last=new Date(date.getFullYear(),date.getMonth()+1,0).getDate(),d=new Date(date.getFullYear(),date.getMonth(),Math.min(e.due,last)),today=new Date();today.setHours(0,0,0,0);let diff=Math.ceil((d-today)/86400000);if(diff<0)return'overdue';if(diff<=3)return'warning';return''}
function dueLabel(s){return s==='paid'?'Paid':s==='overdue'?'OVERDUE':s==='warning'?'DUE SOON':''}
function render(){let x=data(),t={income:0,expense:0,saving:0};x.forEach(e=>t[e.kind]+=+e.amount);let bal=t.income-t.expense-t.saving,p=t.income?Math.round(t.expense/t.income*100):0,m=monthlyMessages[date.getMonth()];monthTitle.textContent=`${date.getFullYear()}년 ${date.getMonth()+1}월`;heroMonth.textContent=date.getMonth()+1;heroLead.textContent=m[0];heroEm.textContent=m[1];heroTail.textContent=m[2];heroComment.textContent=m[3];income.textContent=fmt.format(t.income);expense.textContent=fmt.format(t.expense);saving.textContent=fmt.format(t.saving);balance.textContent=fmt.format(bal);ratio.textContent=p+'%';balanceCard.classList.toggle('danger',bal<0);balanceNote.textContent=bal>=0?'여유 자금이 생겼어요. 저축 목표에 더해보세요.':'예산보다 더 쓰고 있어요. 큰 지출부터 확인해보세요.';count.textContent=x.length+'건 · 클릭하면 Paid';entries.innerHTML=x.length?x.map(e=>{let s=dueState(e),status=dueLabel(s);return `<div class="entry ${s}" onclick="togglePaid(${e.id})"><span class="icon ${e.kind}">${e.paid?'✓':e.kind==='income'?'+':e.kind==='saving'?'◎':'−'}</span><div><b>${esc(e.category)}</b><small>${e.due?e.due+'일 예정':e.kind==='income'?'월 수입':e.kind==='saving'?'저축 목표':'일반 지출'}</small><span class="badges">${e.recurring?'<i class="badge">매달 반복</i>':''}${status?`<i class="badge ${s}">${status}</i>`:''}</span></div><strong class="amount ${e.kind}">${e.kind==='income'?'+':'−'}${fmt.format(e.amount)}</strong><button class="del" title="삭제" onclick="event.stopPropagation();removeEntry(${e.id})">×</button></div>`}).join(''):'<p class="empty">첫 내역을 추가해보세요.</p>';let cats={};x.filter(e=>e.kind==='expense').forEach(e=>cats[e.category]=(cats[e.category]||0)+ +e.amount);let rows=Object.entries(cats).sort((a,b)=>b[1]-a[1]).slice(0,5);categories.innerHTML=rows.length?rows.map(([n,v])=>`<div class="bar"><div><span>${esc(n)}</span><b>${fmt.format(v)}</b></div><i><u style="width:${t.expense?v/t.expense*100:0}%"></u></i></div>`).join(''):'<p class="empty">지출을 입력하면 분석이 보여요.</p>'}
function esc(s){return String(s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]))}function move(n){date=new Date(date.getFullYear(),date.getMonth()+n,1);render()}function goToday(){date=new Date();render()}function togglePaid(id){let x=data(),e=x.find(v=>v.id===id);if(e){e.paid=!e.paid;save(x);render()}}function removeEntry(id){save(data().filter(e=>e.id!==id));render()}document.querySelectorAll('.seg button').forEach(b=>b.onclick=()=>{document.querySelectorAll('.seg button').forEach(x=>x.classList.remove('on'));b.classList.add('on');kind=b.dataset.kind});form.onsubmit=e=>{e.preventDefault();let x=data();x.push({id:Date.now(),kind,category:category.value.trim(),amount:+amountInput.value,due:due.value?+due.value:null,recurring:recurring.checked,paid:false});save(x);form.reset();recurring.checked=true;render()};authForm.onsubmit=async e=>{e.preventDefault();authError.textContent='';unlockButton.disabled=true;unlockButton.textContent='확인 중…';try{await unlock(passwordInput.value);passwordInput.value='';authGate.hidden=true;app.hidden=false;render()}catch(err){cryptoKey=null;authError.textContent=err.message==='비밀번호가 맞지 않습니다.'?err.message:'저장 데이터를 열 수 없습니다. 비밀번호를 확인하세요.';passwordInput.select()}finally{unlockButton.disabled=false;unlockButton.textContent='잠금 해제'}};
</script></body></html>
